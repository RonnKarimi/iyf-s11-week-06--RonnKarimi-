<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 12.3 - POST Requests</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Create a New Post</h1>

    <form id="postForm">

        <input
            type="text"
            id="title"
            placeholder="Post Title"
            required
        >

        <textarea
            id="body"
            placeholder="Write your post..."
            required
        ></textarea>

        <button type="submit">
            Submit Post
        </button>

    </form>

    <div id="result"></div>

</div>

<script src="app.js"></script>

</body>
</html>
